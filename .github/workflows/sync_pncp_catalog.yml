name: Sync Catálogo PNCP

on:
  # Executa todo dia às 06:00 UTC (03:00 Brasília)
  schedule:
    - cron: '0 6 * * *'

  # Permite acionar manualmente pela aba Actions do GitHub
  workflow_dispatch:
    inputs:
      max_paginas:
        description: 'Máx de páginas PNCP por requisição (500 atas/página)'
        required: false
        default: '10'

jobs:
  seed-pncp-catalog:
    name: Atualizar catálogo PNCP no Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci --prefer-offline

      - name: Executar seed do catálogo PNCP
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_PAGINAS: ${{ github.event.inputs.max_paginas || '10' }}
        run: node scripts/seed_pncp_catalog.js

      - name: Notificar sucesso no Slack (opcional)
        if: success()
        run: |
          echo "✅ Catálogo PNCP atualizado com sucesso em $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Notificar falha
        if: failure()
        run: |
          echo "❌ FALHA na atualização do catálogo PNCP em $(date -u '+%Y-%m-%d %H:%M UTC')"
          exit 1
